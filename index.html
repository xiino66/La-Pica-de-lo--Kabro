<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pica de lo' Kabro 🍔</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🍔 La Pica de lo' Kabro</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto text-center">
        <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>

        <li class="nav-item">
          <a class="nav-link position-relative" href="carrito.html">
            <i class="fas fa-shopping-cart"></i>
            <span id="contador-carrito" class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero d-flex align-items-center text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">El Sabor que Manda 🍔🔥</h1>
        <p class="lead">Comida rápida, brutal y sin filtro</p>

        <a href="#" class="btn btn-warning btn-lg me-2">🍟 Ver Menú</a>
        <a href="#" class="btn btn-danger btn-lg">🛒 Pedir Ahora</a>
    </div>
</section>

<!-- PRODUCTOS -->
<section class="container py-5">
    <h2 class="text-center mb-4 fw-bold">🔥 Lo Más Pedido</h2>

    <div class="row g-4">

        <!-- Producto 1 -->
        <div class="col-md-4">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Hamburguesa Kabrona</h5>
                    <p>$5.990</p>
                    <button class="btn btn-danger agregar-carrito"
                        data-id="1"
                        data-nombre="Hamburguesa Kabrona"
                        data-precio="5990"
                        data-img="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
                        Agregar
                    </button>
                </div>
            </div>
        </div>

        <!-- Producto 2 -->
        <div class="col-md-4">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Completo Explosivo</h5>
                    <p>$3.990</p>
                    <button class="btn btn-danger agregar-carrito"
                        data-id="2"
                        data-nombre="Completo Explosivo"
                        data-precio="3990"
                        data-img="https://images.unsplash.com/photo-1585238342024-78d387f4a707">
                        Agregar
                    </button>
                </div>
            </div>
        </div>

        <!-- Producto 3 -->
        <div class="col-md-4">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Papas XL</h5>
                    <p>$2.990</p>
                    <button class="btn btn-danger agregar-carrito"
                        data-id="3"
                        data-nombre="Papas XL"
                        data-precio="2990"
                        data-img="https://images.unsplash.com/photo-1550547660-d9450f859349">
                        Agregar
                    </button>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="text-center p-4">
    <p>© 2026 La Pica de lo' Kabro 🍔</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/carrito.js"></script>

</html>
